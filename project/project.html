<!DOCTYPE html>
<html lang="en">
<head>
    <title>CPSC 487/587</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19.1/dist/lil-gui.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/10.3.0/math.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quaternion@1.5.1/quaternion.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/numeric@1.2.6/numeric-1.2.6.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stats.js@0.17.0/build/stats.min.js"></script>
    <script type="importmap">
        {
            "imports": {
              "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
              "three/": "https://unpkg.com/three@0.160.0/"
            }
        }
    </script>
</head>
<body>
<script type="module">
    import {ThreeEngine, get_default_lil_gui} from "../js/utils/utils_three.js";
    
    let engine = ThreeEngine.new_default_3d();
    engine.camera.position.set(3, 1, 0);
    engine.camera.lookAt(0, 0, 0);

    let gui = get_default_lil_gui();
    let settings = {
        reset_position: function(){
            engine.camera.position.set(3,1,0);
        }
    };
    gui.add(settings, 'reset_position').name('Reset Position');

    engine.add_suzanne_monkey_as_mesh_object(0x00eeff);
    let suzanne = engine.mesh_objects[0];
    engine.toggle_mesh_object_wireframe_visibility(0);
    let standard_points = engine.get_local_vertex_positions_of_mesh_object(0);
    let wireframe_points = engine.get_local_vertex_positions_of_mesh_object_wireframe(0);
    let mouse_x = 0;
    let mouse_y = 0;

    let suzanne_pos = [0, 0, 0];

    window.addEventListener("mousemove", (event) => {
        mouse_x = (event.clientX/window.innerWidth)*2 - 1;
        mouse_y = -(event.clientY/window.innerHeight)*2 + 1;
    });

    function multiply_3x3(A, B) {
        return [
            [A[0][0]*B[0][0] + A[0][1]*B[1][0] + A[0][2]*B[2][0],
                A[0][0]*B[0][1] + A[0][1]*B[1][1] + A[0][2]*B[2][1],
                A[0][0]*B[0][2] + A[0][1]*B[1][2] + A[0][2]*B[2][2]],
            [A[1][0]*B[0][0] + A[1][1]*B[1][0] + A[1][2]*B[2][0],
                A[1][0]*B[0][1] + A[1][1]*B[1][1] + A[1][2]*B[2][1],
                A[1][0]*B[0][2] + A[1][1]*B[1][2] + A[1][2]*B[2][2]],
            [A[2][0]*B[0][0] + A[2][1]*B[1][0] + A[2][2]*B[2][0],
                A[2][0]*B[0][1] + A[2][1]*B[1][1] + A[2][2]*B[2][1],
                A[2][0]*B[0][2] + A[2][1]*B[1][2] + A[2][2]*B[2][2]]
        ];
    }

    // build SE(3) rotation matrix from head angles + translations
    function se3_rotation_matrix(theta_x, theta_y, t_x, t_y, t_z) {
        let cos_x = Math.cos(theta_x);
        let sin_x = Math.sin(theta_x);
        let cos_y = Math.cos(theta_y);
        let sin_y = Math.sin(theta_y);
        let Rx = [
            [cos_x, 0, sin_x],
            [0, 1, 0],
            [-sin_x, 0, cos_x]
        ];
        let Ry = [
            [cos_y, -sin_y, 0],
            [sin_y, cos_y, 0],
            [0, 0, 1]
        ];
        let R = multiply_3x3(Rx, Ry);
        return [
            [R[0][0], R[0][1], R[0][2], t_x],
            [R[1][0], R[1][1], R[1][2], t_y],
            [R[2][0], R[2][1], R[2][2], t_z],
            [0, 0, 0, 1]
        ];
    }

    function apply_se3(M, p) {
        return [
            [M[0][0]*p[0] + M[0][1]*p[1] + M[0][2]*p[2] + M[0][3]],
            [M[1][0]*p[0] + M[1][1]*p[1] + M[1][2]*p[2] + M[1][3]],
            [M[2][0]*p[0] + M[2][1]*p[1] + M[2][2]*p[2] + M[2][3]]
        ];
    }

    engine.animation_loop(() => {
        let x_rotation_sensitivity = 0.4;
        let y_rotation_sensitivity = 0.3;

        let max_theta_x = Math.PI * x_rotation_sensitivity;
        let max_theta_y = Math.PI * y_rotation_sensitivity;
        
        let theta_x = -mouse_y * max_theta_x;
        let theta_y = mouse_x * max_theta_y;
        let target_pos = [0, mouse_x, mouse_y];

        let speed = 0.03;
        suzanne_pos[0] += speed * (target_pos[0]-suzanne_pos[0]);
        suzanne_pos[1] += speed * (target_pos[1]-suzanne_pos[1]);
        suzanne_pos[2] += speed * (target_pos[2]-suzanne_pos[2]);

        let R = se3_rotation_matrix(theta_x, theta_y, suzanne_pos[0], suzanne_pos[1], suzanne_pos[2]);

        let new_standard_points = standard_points.map(p => {
            return apply_se3(R, p);
        });
        let new_wireframe_points = wireframe_points.map(p => {
            return apply_se3(R, p);
        });

        engine.update_vertex_positions_of_mesh_object(0, new_standard_points);
        engine.update_vertex_positions_of_mesh_object_wireframe(0, new_wireframe_points);
    });

</script>
</body>
</html>
